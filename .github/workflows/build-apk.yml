name: Build Android APK (TWA)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap (JDK + Android SDK パスを設定してインタラクティブ入力をスキップ)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          # "n" = 既存JDKを使う / その後の質問はすべてデフォルト(Enter)
          # ANDROID_HOME は GitHub Actions に既にインストール済みのものを使う
          printf 'n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' | \
            bubblewrap init \
              --manifest=https://ahixin.github.io/takken-master/manifest.json \
              --directory=. 2>&1 || true

      - name: Apply TWA manifest overrides
        run: |
          cd twa-build
          if [ ! -f twa-manifest.json ]; then
            echo "twa-manifest.json not found, copying from root..."
            cp ../twa-manifest.json .
          fi
          echo "Using twa-manifest.json:"
          cat twa-manifest.json

      - name: Build APK
        working-directory: twa-build
        run: |
          printf 'n\n\n\n\n\n\n\n\n\n' | bubblewrap build 2>&1

      - name: List output files
        if: always()
        run: |
          echo "=== twa-build contents ==="
          find twa-build -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la twa-build/ 2>/dev/null || echo "twa-build not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: takken-master-apk
          path: |
            twa-build/app-release-signed.apk
            twa-build/app-release.apk
            twa-build/*.apk
          if-no-files-found: warn
