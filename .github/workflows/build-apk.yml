name: Build Android APK (TWA)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: |
          cd android
          # gradle wrapper jar が無い場合はダウンロード
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
              -o gradle/wrapper/gradle-wrapper.jar
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew \
              -o gradlew
            chmod +x gradlew
          fi

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace 2>&1

      - name: List APK files
        if: always()
        run: find android -name "*.apk" 2>/dev/null || echo "APK not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: takken-master-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
