name: Build Android APK (TWA)

on:
  push:
    branches: [ master ]
  workflow_dispatch:   # 手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          bubblewrap init --manifest=https://ahixin.github.io/takken-master/manifest.json \
            --directory=. \
            --skip-pwa-shell-update \
            2>&1 || true
          # twa-manifest.json が生成されていない場合は手動で作成
          if [ ! -f twa-manifest.json ]; then
            cp ../twa-manifest.json .
          fi

      - name: Copy TWA manifest if needed
        run: |
          if [ ! -f twa-build/twa-manifest.json ]; then
            cp twa-manifest.json twa-build/
          fi

      - name: Build APK
        working-directory: twa-build
        run: bubblewrap build 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: takken-master-apk
          path: |
            twa-build/app-release-signed.apk
            twa-build/app-release.apk
            twa-build/*.apk
          if-no-files-found: warn
