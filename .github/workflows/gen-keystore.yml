name: Generate Release Keystore (one-time)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias takken-master-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore release.jks \
            -storepass TakkenMaster2024! \
            -keypass TakkenMaster2024! \
            -dname "CN=Takken Master, OU=App, O=TakkenMaster, L=Tokyo, ST=Tokyo, C=JP"

      - name: Output base64 and SHA256
        run: |
          echo "=== KEYSTORE_BASE64 (copy to GitHub Secret) ==="
          base64 -w 0 release.jks
          echo ""
          echo "=== SHA256 Fingerprint ==="
          keytool -list -v \
            -keystore release.jks \
            -alias takken-master-key \
            -storepass TakkenMaster2024! \
            | grep "SHA256:"
